spring.application.name=cloudP
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/cloudp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=pass@321

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=R9!xQp2@Lm#K7Z$E0WnA4F^Y8HCDsJrM
app.jwt.expiration-ms=86400000

# ===== AWS S3 (same region where you created the bucket) =====
aws.region=ap-south-1
aws.s3.bucket=resumecloudprojects-files
aws.s3.processed-prefix=processed/


# presigned URL expiry (we'll use this later)
aws.s3.presign.expiry-seconds=300


# ===== File validation =====
file.max-size-bytes=10485760
file.allowed-content-types=text/plain,application/pdf
file.allowed-extensions=txt,pdf

# ===== Cleanup =====
cleanup.enabled=true

# Run cleanup every 10 minutes
cleanup.cron=0 */10 * * * *

# Delete FAILED files after 10 minutes
cleanup.failed-ttl-minutes=10

# Delete PRESIGN_CREATED (unconfirmed) files after 10 minutes
cleanup.unconfirmed-ttl-minutes=10


aws.lambda.pii.function-name=cloudP-pii-processor
aws.lambda.invoke-async=true
